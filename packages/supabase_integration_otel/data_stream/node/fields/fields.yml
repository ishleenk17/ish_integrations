- name: supabase.node.vmstat.pgmajfault
  type: double
  metric_type: gauge
  description: Major page faults.
- name: supabase.node.vmstat.oom_kill
  type: double
  metric_type: gauge
  description: OOM killer invocations.

# --- System ---
- name: supabase.node.boot_time_seconds
  type: double
