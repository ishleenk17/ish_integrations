- name: supabase.node.vmstat.pswpin
  type: double
  metric_type: gauge
  description: Pages swapped in.
- name: supabase.node.vmstat.pswpout
  type: double
  metric_type: gauge
  description: Pages swapped out.
- name: supabase.node.vmstat.pgfault
  type: double
  metric_type: gauge
