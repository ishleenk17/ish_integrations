# Supabase Node / Infrastructure metrics
# Source: node_exporter on the Supabase database host
# Reference: https://github.com/supabase/supabase-grafana

# --- Labels / Dimensions ---
- name: supabase.labels
  type: group
  fields:
    - name: instance
      type: keyword
      description: Supabase project instance identifier.
      dimension: true
    - name: job
      type: keyword
      description: Prometheus scrape job name.
      dimension: true

# --- CPU ---
- name: supabase.node.cpu.seconds.count
  type: double
  metric_type: counter
  unit: s
  description: Seconds the CPUs spent in each mode (user, system, idle, iowait, etc.).
- name: supabase.node.cpu.guest_seconds.count
  type: double
  metric_type: counter
  unit: s
  description: Seconds the CPUs spent in guests (VMs) for each mode.

# --- Load ---
- name: supabase.node.load1
  type: double
  metric_type: gauge
  description: 1-minute load average.
- name: supabase.node.load5
  type: double
  metric_type: gauge
  description: 5-minute load average.
- name: supabase.node.load15
  type: double
  metric_type: gauge
  description: 15-minute load average.

