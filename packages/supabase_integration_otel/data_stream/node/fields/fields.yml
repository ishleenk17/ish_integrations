  description: Current throttle state of the cooling device.
- name: supabase.node.power_supply_online
  type: double
  metric_type: gauge
  description: Whether the power supply is online (0/1).

# --- Scrape Metadata ---
- name: supabase.node.scrape_collector_duration_seconds
  type: double
  metric_type: gauge
  unit: s
  description: Duration of node exporter collector scrape.
- name: supabase.node.scrape_collector_success
  type: double
  metric_type: gauge
  description: Whether the node exporter collector scrape succeeded (0/1).
