  description: Node boot time (unix epoch).
- name: supabase.node.context_switches.count
  type: double
  metric_type: counter
  description: Total context switches.
- name: supabase.node.interrupts.count
  type: double
  metric_type: counter
  description: Total interrupts serviced.
- name: supabase.node.forks.count
  type: double
  metric_type: counter
  description: Total process forks.
- name: supabase.node.procs_running
  type: double
  metric_type: gauge
  description: Number of processes in runnable state.
- name: supabase.node.procs_blocked
  type: double
  metric_type: gauge
  description: Number of processes blocked waiting for I/O.
- name: supabase.node.entropy_available_bits
  type: double
  metric_type: gauge
  description: Available entropy bits.

# --- File Descriptors ---
- name: supabase.node.filefd.allocated
  type: double
  metric_type: gauge
  description: Allocated file descriptors.
- name: supabase.node.filefd.maximum
  type: double
  metric_type: gauge
  description: Maximum file descriptors.

# --- Hardware ---
- name: supabase.node.hwmon_temp_celsius
  type: double
  metric_type: gauge
  description: Hardware temperature sensor reading in Celsius.
- name: supabase.node.cooling_device_cur_state
  type: double
