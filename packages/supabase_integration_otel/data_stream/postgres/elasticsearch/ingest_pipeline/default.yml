---
description: >
  Rename PostgreSQL Prometheus metrics into the supabase.pg*.* namespace.
  Uses a script processor with a lookup map instead of individual rename processors.
processors:
  - script:
      tag: rename_metrics_to_supabase_namespace
      description: >
        Renames raw Prometheus metric names from the metrics.* object into
        the supabase.* namespace using a static lookup map (57 mappings).
      lang: painless
      source: >
        def RENAME_MAP = [
          'connection_stats_connection_count': 'supabase.connection_stats.connection_count',
          'direct_connection_stats_connection_count': 'supabase.direct_connection_stats.connection_count',
          'max_connections_connection_count': 'supabase.max_connections.connection_count',
          'pg_database_size_bytes': 'supabase.pg_database_size.bytes',
          'pg_database_size_mb': 'supabase.pg_database_size.mb',
          'pg_exporter_last_scrape_duration_seconds': 'supabase.pg_exporter.last_scrape_duration_seconds',
          'pg_exporter_last_scrape_error': 'supabase.pg_exporter.last_scrape_error',
          'pg_exporter_scrapes_total': 'supabase.pg_exporter.scrapes.count',
          'pg_in_recovery': 'supabase.pg_status.in_recovery',
          'pg_ls_archive_statusdir_wal_pending': 'supabase.pg_ls.archive_statusdir_wal_pending.count',
          'pg_replication_slots_max_lag_bytes': 'supabase.pg_replication_slots.max_lag_bytes',
          'pg_settings_default_transaction_read_only': 'supabase.pg_settings.default_transaction_read_only',
          'pg_stat_activity_max_tx_duration': 'supabase.pg_stat_activity.xact_runtime',
          'pg_stat_bgwriter_buffers_alloc_total': 'supabase.pg_stat_bgwriter.buffers_alloc.count',
          'pg_stat_bgwriter_buffers_backend': 'supabase.pg_stat_bgwriter.buffers_backend.count',
          'pg_stat_bgwriter_buffers_checkpoint_total': 'supabase.pg_stat_bgwriter.buffers_checkpoint.count',
          'pg_stat_bgwriter_buffers_clean_total': 'supabase.pg_stat_bgwriter.buffers_clean.count',
          'pg_stat_bgwriter_checkpoint_sync_time_total': 'supabase.pg_stat_bgwriter.checkpoint_sync_time.count',
          'pg_stat_bgwriter_checkpoint_write_time_total': 'supabase.pg_stat_bgwriter.checkpoint_write_time.count',
          'pg_stat_bgwriter_checkpoints_req_total': 'supabase.pg_stat_bgwriter.checkpoints_req.count',
          'pg_stat_bgwriter_checkpoints_timed_total': 'supabase.pg_stat_bgwriter.checkpoints_timed.count',
          'pg_stat_bgwriter_maxwritten_clean_total': 'supabase.pg_stat_bgwriter.maxwritten_clean.count',
          'pg_stat_database_blks_hit_total': 'supabase.pg_stat_database.blks_hit.count',
          'pg_stat_database_blks_read_total': 'supabase.pg_stat_database.blks_read.count',
          'pg_stat_database_conflicts_confl_bufferpin_total': 'supabase.pg_stat_database.conflicts_confl_bufferpin.count',
          'pg_stat_database_conflicts_confl_deadlock_total': 'supabase.pg_stat_database.conflicts_confl_deadlock.count',
          'pg_stat_database_conflicts_confl_lock_total': 'supabase.pg_stat_database.conflicts_confl_lock.count',
          'pg_stat_database_conflicts_confl_snapshot_total': 'supabase.pg_stat_database.conflicts_confl_snapshot.count',
          'pg_stat_database_conflicts_confl_tablespace_total': 'supabase.pg_stat_database.conflicts_confl_tablespace.count',
          'pg_stat_database_conflicts_total': 'supabase.pg_stat_database.conflicts.count',
          'pg_stat_database_deadlocks_total': 'supabase.pg_stat_database.deadlocks.count',
          'pg_stat_database_num_backends': 'supabase.pg_stat_database.num_backends',
          'pg_stat_database_temp_bytes_total': 'supabase.pg_stat_database.temp_bytes.count',
          'pg_stat_database_temp_files_total': 'supabase.pg_stat_database.temp_files.count',
          'pg_stat_database_tup_deleted_total': 'supabase.pg_stat_database.tup_deleted.count',
          'pg_stat_database_tup_fetched_total': 'supabase.pg_stat_database.tup_fetched.count',
          'pg_stat_database_tup_inserted_total': 'supabase.pg_stat_database.tup_inserted.count',
          'pg_stat_database_tup_returned_total': 'supabase.pg_stat_database.tup_returned.count',
          'pg_stat_database_tup_updated_total': 'supabase.pg_stat_database.tup_updated.count',
          'pg_stat_database_xact_commit_total': 'supabase.pg_stat_database.xact_commit.count',
          'pg_stat_database_xact_rollback_total': 'supabase.pg_stat_database.xact_rollback.count',
          'pg_stat_replication_replay_lag': 'supabase.pg_stat_replication.replay_lag',
          'pg_stat_replication_send_lag': 'supabase.pg_stat_replication.send_lag',
          'pg_stat_statements_total_queries': 'supabase.pg_stat_statements.total_queries.count',
          'pg_stat_statements_total_time_seconds': 'supabase.pg_stat_statements.total_time_seconds.count',
          'pg_up': 'supabase.pg.up',
          'pg_wal_size_bytes': 'supabase.pg_wal.size',
          'pg_wal_size_mb': 'supabase.pg_wal.size_mb',
          'physical_replication_lag_is_connected_to_primary': 'supabase.physical_replication_lag.is_connected_to_primary',
          'physical_replication_lag_is_wal_replay_paused': 'supabase.physical_replication_lag.is_wal_replay_paused',
          'physical_replication_lag_physical_replication_lag_seconds': 'supabase.physical_replication_lag_seconds',
          'physical_replication_lag_seconds': 'supabase.physical_replication_lag_seconds',
          'postgresql_restarts_total': 'supabase.postgresql.restarts.count',
          'replication_realtime_lag_bytes': 'supabase.replication_realtime.lag_bytes',
          'replication_realtime_slot_status': 'supabase.replication_realtime.slot_status',
          'replication_slots_max_lag_bytes': 'supabase.pg_replication_slots.max_lag_bytes',
          'supabase_usage_metrics_user_queries_total': 'supabase.usage_metrics.user_queries.count'
        ];
        def DOT = /[.]/;
        if (ctx.containsKey('metrics')) {
          def metricsMap = ctx.metrics;
          def keysToRemove = [];
          for (def entry : metricsMap.entrySet()) {
            if (RENAME_MAP.containsKey(entry.getKey())) {
              def target = RENAME_MAP.get(entry.getKey());
              def parts = DOT.split(target);
              def current = ctx;
              for (int i = 0; i < parts.length - 1; i++) {
                if (!current.containsKey(parts[i])) {
                  current[parts[i]] = new HashMap();
                }
                current = current[parts[i]];
              }
              current[parts[parts.length - 1]] = entry.getValue();
              keysToRemove.add(entry.getKey());
            }
          }
          for (def key : keysToRemove) {
            metricsMap.remove(key);
          }
        }
  - remove:
      tag: drop_remaining_metrics
      field: metrics
      ignore_missing: true

on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
        in pipeline '{{{ _ingest.pipeline }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
