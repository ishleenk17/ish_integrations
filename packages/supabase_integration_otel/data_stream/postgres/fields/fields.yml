# Supabase PostgreSQL metrics
# Source: pg_exporter + custom Supabase postgres metrics
# Reference: https://github.com/supabase/supabase-grafana

# --- Labels / Dimensions ---
- name: supabase.labels
  type: group
  fields:
    - name: instance
      type: keyword
      description: Supabase project instance identifier.
      dimension: true
    - name: job
      type: keyword
      description: Prometheus scrape job name.
      dimension: true

# --- Database Health ---
- name: supabase.pg_database_size.bytes
  type: double
  metric_type: gauge
  unit: byte
  description: Disk space used by the database.
- name: supabase.pg_database_size.mb
  type: double
  metric_type: gauge
  description: Disk space used by the database in MB.
- name: supabase.pg.up
  type: double
  metric_type: gauge
  description: Whether the last scrape of metrics from PostgreSQL was able to connect.
- name: supabase.pg_status.in_recovery
  type: double
  metric_type: gauge
  description: Whether the database is in recovery mode.
- name: supabase.pg_settings.default_transaction_read_only
  type: double
  metric_type: gauge
  description: Default transaction read-only setting.

# --- WAL ---
- name: supabase.pg_wal.size
  type: double
  metric_type: gauge
  unit: byte
  description: Disk space used by WAL files.
- name: supabase.pg_wal.size_mb
  type: double
  metric_type: gauge
  description: WAL files disk usage in MB.
- name: supabase.pg_ls.archive_statusdir_wal_pending.count
  type: double
  metric_type: counter
  description: Number of not yet archived WAL files.

# --- Replication ---
- name: supabase.physical_replication_lag_seconds
  type: double
  metric_type: gauge
  unit: s
  description: Physical replication lag in seconds.
- name: supabase.physical_replication_lag.is_connected_to_primary
  type: double
  metric_type: gauge
  description: Whether the replica is connected to the primary database.
- name: supabase.physical_replication_lag.is_wal_replay_paused
  type: double
  metric_type: gauge
  description: Whether WAL replay has been paused.
- name: supabase.pg_replication_slots.max_lag_bytes
  type: double
  metric_type: gauge
  unit: byte
  description: Maximum replication lag across all replication slots.
- name: supabase.pg_stat_replication.send_lag
  type: double
  metric_type: gauge
  unit: s
  description: Replication send lag.
- name: supabase.pg_stat_replication.replay_lag
  type: double
  metric_type: gauge
  unit: s
  description: Replication replay lag.
- name: supabase.replication_realtime.slot_status
  type: double
  metric_type: gauge
  description: Realtime replication slot status.
- name: supabase.replication_realtime.lag_bytes
  type: double
  metric_type: gauge
  unit: byte
  description: Realtime replication lag in bytes.

# --- Connections ---
- name: supabase.pg_stat_database.num_backends
  type: double
  metric_type: gauge
  description: Number of active backends (connections) to the database.

# --- Transactions ---
- name: supabase.pg_stat_database.xact_commit.count
  type: double
  metric_type: counter
  description: Total transactions committed.
- name: supabase.pg_stat_database.xact_rollback.count
  type: double
  metric_type: counter
  description: Total transactions rolled back.

# --- Tuple Operations ---
- name: supabase.pg_stat_database.tup_fetched.count
  type: double
  metric_type: counter
  description: Total rows fetched by queries.
- name: supabase.pg_stat_database.tup_returned.count
  type: double
  metric_type: counter
  description: Total rows returned by queries.
- name: supabase.pg_stat_database.tup_inserted.count
  type: double
  metric_type: counter
  description: Total rows inserted.
- name: supabase.pg_stat_database.tup_updated.count
  type: double
  metric_type: counter
  description: Total rows updated.
- name: supabase.pg_stat_database.tup_deleted.count
  type: double
  metric_type: counter
  description: Total rows deleted.

# --- Cache ---
- name: supabase.pg_stat_database.blks_hit.count
  type: double
  metric_type: counter
  description: Disk blocks found in buffer cache (cache hits).
- name: supabase.pg_stat_database.blks_read.count
  type: double
  metric_type: counter
  description: Number of disk blocks read (cache misses).

# --- Errors ---
- name: supabase.pg_stat_database.deadlocks.count
  type: double
  metric_type: counter
  description: Total deadlocks detected.
- name: supabase.pg_stat_database.conflicts.count
  type: double
  metric_type: counter
  description: Queries canceled due to conflicts with recovery.
- name: supabase.pg_stat_database.conflicts_confl_bufferpin.count
  type: double
  metric_type: counter
  description: Conflicts due to buffer pin.
- name: supabase.pg_stat_database.conflicts_confl_deadlock.count
  type: double
  metric_type: counter
  description: Conflicts due to deadlock.
- name: supabase.pg_stat_database.conflicts_confl_lock.count
  type: double
  metric_type: counter
  description: Conflicts due to lock.
- name: supabase.pg_stat_database.conflicts_confl_snapshot.count
  type: double
  metric_type: counter
  description: Conflicts due to snapshot.
- name: supabase.pg_stat_database.conflicts_confl_tablespace.count
  type: double
  metric_type: counter
  description: Conflicts due to tablespace.

# --- Temp ---
- name: supabase.pg_stat_database.temp_files.count
  type: double
  metric_type: counter
  description: Temp files created by queries.
- name: supabase.pg_stat_database.temp_bytes.count
  type: double
  metric_type: counter
  unit: byte
  description: Temp data written by queries.

# --- Background Writer ---
- name: supabase.pg_stat_bgwriter.checkpoints_timed.count
  type: double
  metric_type: counter
  description: Scheduled checkpoints performed.
- name: supabase.pg_stat_bgwriter.checkpoints_req.count
  type: double
  metric_type: counter
  description: Requested checkpoints performed.
- name: supabase.pg_stat_bgwriter.checkpoint_write_time.count
  type: double
  metric_type: counter
  unit: ms
  description: Time writing checkpoint files to disk.
- name: supabase.pg_stat_bgwriter.checkpoint_sync_time.count
  type: double
  metric_type: counter
  unit: ms
  description: Time syncing checkpoint files to disk.
- name: supabase.pg_stat_bgwriter.buffers_checkpoint.count
  type: double
  metric_type: counter
  description: Buffers written during checkpoints.
- name: supabase.pg_stat_bgwriter.buffers_clean.count
  type: double
  metric_type: counter
  description: Buffers written by the background writer.
- name: supabase.pg_stat_bgwriter.buffers_backend.count
  type: double
  metric_type: counter
  description: Buffers written directly by a backend.
- name: supabase.pg_stat_bgwriter.buffers_alloc.count
  type: double
  metric_type: counter
  description: Buffers allocated.
- name: supabase.pg_stat_bgwriter.maxwritten_clean.count
  type: double
  metric_type: counter
  description: Times bgwriter stopped due to buffer write limit.

# --- Statements ---
- name: supabase.pg_stat_statements.total_queries.count
  type: double
  metric_type: counter
  description: Number of times queries were executed.
- name: supabase.pg_stat_statements.total_time_seconds.count
  type: double
  metric_type: counter
  unit: s
  description: Total time spent executing queries.

# --- Activity ---
- name: supabase.pg_stat_activity.xact_runtime
  type: double
  metric_type: gauge
  unit: s
  description: Current transaction runtime.

# --- PostgreSQL Restarts ---
- name: supabase.postgresql.restarts.count
  type: double
  metric_type: counter
  description: Number of times PostgreSQL has been restarted.

# --- Platform / Usage ---
- name: supabase.usage_metrics.user_queries.count
  type: double
  metric_type: counter
  description: Total user queries (usage tracking).
- name: supabase.connection_stats.connection_count
  type: double
  metric_type: gauge
  description: Total connection count (pooled).
- name: supabase.direct_connection_stats.connection_count
  type: double
  metric_type: gauge
  description: Direct (non-pooled) connection count.
- name: supabase.max_connections.connection_count
  type: double
  metric_type: gauge
  description: Maximum allowed connections.

# --- Exporter Metadata ---
- name: supabase.pg_exporter.scrapes.count
  type: double
  metric_type: counter
  description: Total scrapes performed by the postgres exporter.
- name: supabase.pg_exporter.last_scrape_duration_seconds
  type: double
  metric_type: gauge
  unit: s
  description: Last scrape duration.
- name: supabase.pg_exporter.last_scrape_error
  type: double
  metric_type: gauge
  description: Whether last scrape had an error.
