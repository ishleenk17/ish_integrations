format_version: "3.6.2"
name: supabase_otel
title: "Supabase OpenTelemetry Assets"
version: 0.1.0
description: >-
  Visualizing Supabase metrics collected via the
  OTel Prometheus receiver. Covers infrastructure, PostgreSQL, Supavisor,
  and application service metrics.
type: content
categories:
  - observability
  - monitoring
  - cloud
  - opentelemetry
conditions:
  kibana:
    version: "^9.4.0"
  elastic:
    subscription: basic
icons:
  - src: /img/supabase-logo.svg
    title: Supabase logo
    size: 256x256
    type: image/svg+xml
discovery:
  datasets:
    - name: supabase.metrics.otel
owner:
  type: elastic
  github: elastic/obs-infraobs-integrations
